<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="THE DAY">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#14181d; --chalk:#f2efe9; --flame:#e4571f; --steel:#8a919c;
    --iron:#1d232b; --edge:#2b323c; --done:#7fae6a; --mono:ui-monospace,SFMono-Regular,Menlo,monospace;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  body{background:var(--ink);color:var(--chalk);font-family:Inter,system-ui,sans-serif;
       font-size:15px;line-height:1.45;padding-bottom:calc(94px + env(safe-area-inset-bottom))}
  .wrap{max-width:560px;margin:0 auto;
    padding:calc(14px + env(safe-area-inset-top)) calc(14px + env(safe-area-inset-right)) 0 calc(14px + env(safe-area-inset-left))}

  /* signature: the loop rail */
  .rail{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;margin-bottom:14px}
  .rail div{background:var(--iron);border:1px solid var(--edge);border-radius:4px;
    text-align:center;padding:7px 0 5px;font-size:10px;font-weight:800;letter-spacing:.06em;
    color:var(--steel)}
  .rail div span{display:block;font-size:8px;font-weight:600;letter-spacing:.1em;margin-top:1px}
  .rail .now{background:var(--flame);border-color:var(--flame);color:var(--ink)}
  .rail .now span{color:var(--ink)}

  .daylabel{font-family:'Archivo Black',Impact,system-ui;font-size:52px;line-height:.95;
    letter-spacing:-.01em;text-transform:uppercase;margin:2px 0 2px}
  .daysub{color:var(--steel);font-weight:600;font-size:13px;margin-bottom:14px}
  .daysub b{color:var(--chalk)}

  .banner{background:var(--flame);color:var(--ink);border-radius:6px;padding:10px 12px;
    font-weight:800;font-size:13px;letter-spacing:.02em;margin-bottom:14px}

  .card{background:var(--iron);border:1px solid var(--edge);border-radius:8px;
    padding:4px 0;margin-bottom:14px;overflow:hidden}
  .card h2{font-size:11px;letter-spacing:.14em;color:var(--steel);font-weight:800;
    padding:10px 14px 6px;text-transform:uppercase}
  .card h2 em{color:var(--flame);font-style:normal}

  .item{display:flex;gap:11px;align-items:flex-start;padding:10px 14px;
    border-top:1px solid var(--edge);cursor:pointer;user-select:none}
  .box{flex:0 0 20px;height:20px;margin-top:1px;border:2px solid var(--steel);
    border-radius:4px;position:relative}
  .item.on .box{border-color:var(--done);background:var(--done)}
  .item.on .box::after{content:"";position:absolute;left:5px;top:1px;width:5px;height:10px;
    border:solid var(--ink);border-width:0 2.5px 2.5px 0;transform:rotate(42deg)}
  .item .tx{flex:1}
  .item.on .tx{color:var(--steel);text-decoration:line-through;text-decoration-color:var(--edge)}
  .tx b{font-weight:800}
  .m{display:block;font-family:var(--mono);font-size:12px;color:var(--flame);margin-top:2px}
  .item.on .m{color:var(--steel)}
  .cue{color:var(--steel);font-size:12.5px}
  .sets{font-family:var(--mono);font-size:13px;color:var(--chalk);font-weight:600;white-space:nowrap}

  .eyebrow{font-size:10px;letter-spacing:.16em;color:var(--steel);font-weight:800;
    text-transform:uppercase;margin:0 2px 6px;display:flex;justify-content:space-between}
  .eyebrow span{color:var(--edge)}
  .macrobar{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;margin-bottom:14px}
  .macrobar>div{background:var(--iron);border:1px solid var(--edge);border-radius:6px;
    text-align:center;padding:8px 2px}
  .macrobar>div.budget{border-color:var(--flame)}
  .macrobar>div.budget .v,.macrobar>div.budget input{color:var(--flame)}
  .macrobar .v{font-family:var(--mono);font-weight:600;font-size:15px}
  .macrobar .k{font-size:9px;letter-spacing:.12em;color:var(--steel);font-weight:800}
  .macrobar input{width:64px;background:transparent;border:none;border-bottom:1px dashed var(--steel);
    color:var(--chalk);font-family:var(--mono);font-size:15px;font-weight:600;text-align:center}
  .macrobar input:focus{outline:none;border-bottom-color:var(--flame)}

  .btn{display:block;width:100%;border:none;border-radius:8px;padding:15px;
    font-family:Inter;font-size:15px;font-weight:800;letter-spacing:.03em;cursor:pointer}
  .btn.go{background:var(--flame);color:var(--ink)}
  .btn.ghost{background:transparent;color:var(--steel);border:1px solid var(--edge);margin-top:8px}
  .btn:active{transform:translateY(1px)}

  .foot{position:fixed;left:0;right:0;bottom:0;background:linear-gradient(transparent,var(--ink) 30%);
    padding:18px calc(14px + env(safe-area-inset-right)) calc(14px + env(safe-area-inset-bottom)) calc(14px + env(safe-area-inset-left))}
  .foot .in{max-width:560px;margin:0 auto;display:flex;gap:8px;align-items:center;justify-content:space-between}
  .seg{display:flex;gap:4px}
  .seg button{background:var(--iron);border:1px solid var(--edge);color:var(--steel);
    border-radius:6px;padding:8px 10px;font-weight:800;font-size:12px;cursor:pointer}
  .seg button.on{background:var(--chalk);color:var(--ink);border-color:var(--chalk)}
  .link{background:none;border:none;color:var(--steel);font-size:12px;font-weight:600;
    text-decoration:underline;cursor:pointer}

  .donewrap{text-align:center;padding:34px 10px}
  .donewrap .big{font-family:'Archivo Black',Impact;font-size:40px;color:var(--done);text-transform:uppercase}
  .donewrap p{color:var(--steel);margin-top:6px}

  /* setup */
  #setup{position:fixed;inset:0;background:var(--ink);z-index:10;overflow:auto}
  #setup .wrap{padding-top:calc(38px + env(safe-area-inset-top))}
  #setup h1{font-family:'Archivo Black',Impact;font-size:34px;text-transform:uppercase;margin-bottom:4px}
  #setup p{color:var(--steel);margin-bottom:18px}
  .pick{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:22px}
  .pick button{background:var(--iron);border:1px solid var(--edge);color:var(--chalk);
    border-radius:8px;padding:16px 8px;font-weight:800;font-size:15px;cursor:pointer}
  .pick button.on{background:var(--flame);border-color:var(--flame);color:var(--ink)}
  .hidden{display:none}

  /* backup: rarely-touched utility, low weight, bottom of the page */
  .backup{display:flex;gap:9px;align-items:center;justify-content:center;margin:8px 0 4px}
  .backup button{background:none;border:none;color:var(--steel);font-family:Inter;
    font-size:11px;font-weight:600;letter-spacing:.02em;text-decoration:underline;
    text-decoration-color:var(--edge);cursor:pointer;padding:6px 4px}
  .backup span{color:var(--edge);font-size:11px}
  .backup .build{color:var(--steel)}

  .toast{position:fixed;left:50%;bottom:104px;transform:translateX(-50%);
    background:var(--edge);color:var(--chalk);padding:10px 16px;border-radius:8px;
    font-size:13px;font-weight:600;max-width:88%;text-align:center;
    opacity:0;pointer-events:none;transition:opacity .2s;z-index:20}
  .toast.show{opacity:1}

  /* precision: monospace numerals align as columns */
  .sets,.m,.macrobar .v,.macrobar input,#setupBudget{font-variant-numeric:tabular-nums}
  /* quality floor: visible keyboard focus on every interactive control */
  .item:focus-visible,.btn:focus-visible,.seg button:focus-visible,.link:focus-visible,
  .pick button:focus-visible,.backup button:focus-visible,input:focus-visible,#setupGo:focus-visible{
    outline:2px solid var(--flame);outline-offset:2px;border-radius:4px}
  @media (prefers-reduced-motion: reduce){*{transition:none!important}}
</style>
</head>
<body>

<div id="setup" class="hidden">
  <div class="wrap">
    <h1>Set the loop</h1>
    <p>One-time setup. Which day is today?</p>
    <div class="pick" id="pickDay"></div>
    <p>Current ramp week?</p>
    <div class="pick" id="pickWeek" style="grid-template-columns:1fr 1fr 1fr"></div>
    <p>MacroFactor budget today (kcal)?</p>
    <div style="margin-bottom:22px">
      <input id="setupBudget" type="number" inputmode="numeric" value="2136"
        style="width:100%;background:var(--iron);border:1px solid var(--edge);border-radius:8px;
        color:var(--chalk);font-family:var(--mono);font-size:22px;font-weight:600;padding:14px;text-align:center">
    </div>
    <button class="btn go" id="setupGo">Start</button>
  </div>
</div>

<div class="wrap" id="app"></div>

<div class="foot" id="foot">
  <div class="in">
    <div class="seg" id="weekSeg"></div>
    <button class="link" id="fixDay">fix day</button>
  </div>
</div>

<input type="file" id="importFile" accept="application/json,.json" class="hidden">
<div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
/* ---------- storage: localStorage when hosted, memory fallback otherwise ---------- */
const mem = {};
const store = {
  get(k){ try{ const v = localStorage.getItem(k); return v===null? (k in mem? mem[k]:null) : JSON.parse(v);}catch(e){ return k in mem? mem[k]:null; } },
  set(k,v){ mem[k]=v; try{ localStorage.setItem(k, JSON.stringify(v)); }catch(e){} }
};

/* ---------- date helpers (local, not UTC) ---------- */
function ymd(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function today(){ return ymd(new Date()); }
function addDays(s,n){ const [y,m,d]=s.split("-").map(Number); const dt=new Date(y,m-1,d); dt.setDate(dt.getDate()+n); return ymd(dt); }
function daysBetween(a,b){ const [y1,m1,d1]=a.split("-").map(Number),[y2,m2,d2]=b.split("-").map(Number);
  return Math.round((new Date(y2,m2-1,d2)-new Date(y1,m1-1,d1))/86400000); }

/* ---------- the program ---------- */
const BUILD = "v3"; /* bump alongside sw.js VERSION; shown in the backup row to prove what's live on-device */
const LOOP = ["D1","D2","REST","D3","D4","REST","REST"];
const NAMES = {D1:"Push", D2:"Lower", D3:"Pull", D4:"Lower+Core", REST:"Rest"};
/* type: p primer, c compound, i isolation, lat lateral raise, ab abs */
const LIFTS = {
  D1:[
    {n:"Primers: pull-aparts + straight-arm pulldown", t:"p", full:2, r:"x20 / x15-20", cue:"light, felt"},
    {n:"Barbell OHP", t:"c", full:3, r:"5-8", cue:"brace, no back-bend"},
    {n:"Incline DB press", t:"c", full:3, r:"8-12", cue:"slow down, drive up"},
    {n:"DB lateral raise", t:"lat", full:4, r:"12-20", cue:"THE PRIORITY. strict, no swing"},
    {n:"Banded face pull", t:"i", full:3, r:"15-20", cue:"rear delts + posture"},
    {n:"OH triceps extension", t:"i", full:3, r:"10-15", cue:"full stretch"},
    {n:"Hanging leg raise", t:"ab", full:3, r:"10-15", cue:"abs 1/3"}
  ],
  D2:[
    {n:"Squat ramp: bar x8, 95 x5, 115 x3", t:"p", full:1, r:"", cue:""},
    {n:"Back squat @ 135", t:"c", full:3, r:"6-10", cue:"depth over load"},
    {n:"Romanian deadlift", t:"c", full:3, r:"8-12", cue:"hips back, hamstring stretch"},
    {n:"Bulgarian split squat", t:"i", full:2, r:"8-12 / leg", cue:""},
    {n:"Weighted bench sit-up", t:"ab", full:3, r:"12-15", cue:"abs 2/3"},
    {n:"Calf raise", t:"skip", full:0, r:"SKIP", cue:"flag active"}
  ],
  D3:[
    {n:"Primers: straight-arm pulldown + pull-aparts", t:"p", full:2, r:"x15-20 / x20", cue:"wake the lat FIRST"},
    {n:"Pull-up (band assist ok)", t:"c", full:3, r:"6-10", cue:"elbows to hips"},
    {n:"Barbell row, 1-sec pause", t:"c", full:3, r:"8-12", cue:"squeeze at the pause"},
    {n:"DB pullover", t:"i", full:3, r:"10-15", cue:"slow, big stretch"},
    {n:"DB lateral raise", t:"lat", full:4, r:"12-20", cue:"width, second hit"},
    {n:"Rear delt fly", t:"i", full:3, r:"15-20", cue:""},
    {n:"DB curl", t:"i", full:2, r:"10-15", cue:""}
  ],
  D4:[
    {n:"Conventional deadlift", t:"c", full:3, r:"4-6", cue:"form over load"},
    {n:"Goblet or front squat", t:"c", full:3, r:"8-12", cue:""},
    {n:"DB hip thrust", t:"i", full:3, r:"10-12", cue:"1-sec squeeze"},
    {n:"Hanging leg raise", t:"ab", full:3, r:"10-15", cue:"abs 3/3"},
    {n:"Plank", t:"ab", full:3, r:"30-60s", cue:""},
    {n:"Calf raise", t:"skip", full:0, r:"SKIP", cue:"flag active"}
  ]
};
function setsFor(x, week){
  if(x.t==="p") return x.full;
  if(x.t==="skip") return 0;
  if(x.t==="lat") return week===1?2:week===2?3:4;
  if(x.t==="c") return week===1?2:week===2?3:x.full;
  return week===1?2:week===2?Math.min(2,x.full)===x.full?x.full:2:x.full; /* iso + abs: 2 until W3 */
}

const MORNING = [
  {id:"w1", tx:"<b>Weigh:</b> nude, dry, pre-food. Log it in MacroFactor."},
  {id:"w2", tx:"Teeth."},
  {id:"w3", tx:"<b>16 oz water + Nuun</b> or 1/4 tsp pink salt."},
  {id:"w4", tx:"Sunscreen."},
  {id:"w5", tx:"Read today's MacroFactor budget. Update it below if it moved."}
];
const MEALS_TRAIN = [
  {id:"m1", tx:"<b>M1 &middot; 8:30</b> &mdash; 3 eggs + 50g oats + banana &middot; ~90 min pre-lift", m:"510 &middot; 27P/61C/18F"},
  {id:"peri", tx:"<b>During lift</b> &mdash; ~30g peach rings", m:"100 &middot; 25C"},
  {id:"m2", tx:"<b>M2 &middot; 12:00</b> &mdash; whey + <b>creatine 5g (first shake of the day)</b> &middot; chicken <b>260g raw &rarr; 200g cooked</b> &middot; 150g rice", m:"625 &middot; 87P/44C/8F"},
  {id:"m3", tx:"<b>M3 &middot; 3:30</b> &mdash; 170g Nancy's + 20g honey", m:"155 &middot; 17P/23C"},
  {id:"m4", tx:"<b>M4 &middot; 7:00</b> &mdash; dinner matrix: beef <b>200g raw &rarr; 150g cooked</b> (90/10) or chicken + 10g oil", m:"~555 &middot; 43P/39C/20F"},
  {id:"gap", tx:"<b>9:00</b> &mdash; gap check vs budget &rarr; close with carbs (honey, banana, rice)"},
  {id:"skin", tx:"<b>9:30</b> &mdash; cleanse &rarr; moisturize"},
  {id:"m5", tx:"<b>M5 &middot; 10:15</b> &mdash; casein <b>1.5 scoops (floor, always)</b> + multivitamin + fish oil", m:"~180 &middot; 38P"},
  {id:"out", tx:"<b>11:00</b> &mdash; lights out"}
];
const MEALS_REST = [
  {id:"m1", tx:"<b>M1</b> &mdash; 3 eggs + 50g oats + banana", m:"510 &middot; 27P/61C/18F"},
  {id:"m2", tx:"<b>M2</b> &mdash; whey + <b>creatine 5g (first shake of the day)</b> &middot; chicken <b>260g raw &rarr; 200g cooked</b> &middot; 150g rice", m:"625 &middot; 87P/44C/8F"},
  {id:"m3", tx:"<b>M3</b> &mdash; 170g Nancy's + 20g honey + banana", m:"260 &middot; 18P/50C"},
  {id:"walk", tx:"<b>Optional</b> &mdash; walk or ruck. Heat check, real shoes, salt first. Never eaten back."},
  {id:"m4", tx:"<b>M4</b> &mdash; dinner matrix, same as training days", m:"~555"},
  {id:"gap", tx:"<b>9:00</b> &mdash; gap check vs budget &rarr; close with carbs"},
  {id:"skin", tx:"<b>9:30</b> &mdash; cleanse &rarr; moisturize"},
  {id:"m5", tx:"<b>M5 &middot; 10:15</b> &mdash; casein <b>1.5 scoops (floor, always)</b> + multivitamin + fish oil", m:"~180 &middot; 38P"},
  {id:"out", tx:"<b>11:00</b> &mdash; lights out"}
];

/* ---------- state ---------- */
let st = store.get("state") || null;
function save(){ store.set("state", st); }

function catchUp(){
  const t = today();
  let guard = 0; /* safety clamp: converges in <=7 iters normally, this just prevents any runaway */
  while(st.asOf < t && guard++ < 4000){
    if(LOOP[st.pointer]==="REST"){ st.pointer=(st.pointer+1)%7; st.asOf=addDays(st.asOf,1); }
    else { st.asOf = t; } /* training day not confirmed: loop shifts to today */
  }
  /* prune old check state */
  const c = st.checks||{}; for(const k in c){ if(k!==t) delete c[k]; } st.checks=c;
  save();
}

function checksToday(){ st.checks[today()] = st.checks[today()]||{}; return st.checks[today()]; }
function toggle(id){ const c=checksToday(); c[id]=!c[id]; save(); render(); }

/* ---------- render ---------- */
const app = document.getElementById("app");
function itemRow(x){
  const on = checksToday()[x.id];
  return `<div class="item ${on?"on":""}" role="button" tabindex="0" aria-pressed="${on?"true":"false"}" onclick="toggle('${x.id}')">
    <div class="box"></div>
    <div class="tx">${x.tx}${x.m?`<span class="m">${x.m}</span>`:""}</div></div>`;
}
function liftRow(x, week){
  const s = setsFor(x, week);
  const on = checksToday()["lx_"+x.n];
  const sets = x.t==="skip" ? "SKIP" : x.t==="p" ? x.r : `${s} x ${x.r}`;
  return `<div class="item ${on?"on":""}" role="button" tabindex="0" aria-pressed="${on?"true":"false"}" onclick="toggle('lx_${x.n}')">
    <div class="box"></div>
    <div class="tx">${x.n}${x.cue?`<div class="cue">${x.cue}</div>`:""}</div>
    <div class="sets">${sets}</div></div>`;
}

function render(){
  catchUp();
  const t = today();
  const doneToday = st.asOf > t;
  const slot = LOOP[st.pointer];
  const rail = LOOP.map((d,i)=>{
    const isNow = !doneToday && i===st.pointer;
    return `<div class="${isNow?"now":""}">${d==="REST"?"R":d}<span>${d==="REST"?"rest":NAMES[d]}</span></div>`;
  }).join("");

  let html = `<div class="rail">${rail}</div>`;

  if(doneToday){
    html += `<div class="donewrap"><div class="big">Done</div>
      <p>Today's session is in the books. Tomorrow: <b style="color:var(--chalk)">${LOOP[st.pointer]} ${LOOP[st.pointer]!=="REST"?NAMES[LOOP[st.pointer]]:""}</b>.</p>
      <button class="btn ghost" style="max-width:280px;margin:16px auto 0" onclick="undoDone()">Not done &mdash; back to today</button></div>`;
    html += `<div class="card"><h2>Tonight</h2>${[MEALS_TRAIN.find(m=>m.id==="m4"),MEALS_TRAIN.find(m=>m.id==="gap"),MEALS_TRAIN.find(m=>m.id==="skin"),MEALS_TRAIN.find(m=>m.id==="m5"),MEALS_TRAIN.find(m=>m.id==="out")].map(itemRow).join("")}</div>`;
  } else {
    const isRest = slot==="REST";
    html += `<div class="daylabel">${isRest?"Rest":slot+" "+NAMES[slot]}</div>
      <div class="daysub">${new Date().toLocaleDateString(undefined,{weekday:"long",month:"short",day:"numeric"})}
      &middot; Week <b>${st.week===3?"3+":st.week}</b> ramp</div>`;
    if(!isRest) html += `<div class="banner">SALT + 16 OZ WATER BEFORE THE BAR. Stand up slow between sets.</div>`;
    html += `<div class="card"><h2>Morning</h2>${MORNING.map(itemRow).join("")}</div>`;
    if(!isRest){
      html += `<div class="card"><h2><em>${slot}</em> &middot; ${NAMES[slot]}</h2>${LIFTS[slot].map(x=>liftRow(x,st.week)).join("")}</div>`;
    }
    html += `<div class="card"><h2>${isRest?"Rest day fuel":"Fuel"}</h2>${(isRest?MEALS_REST:MEALS_TRAIN).map(itemRow).join("")}</div>`;
    if(!isRest) html += `<button class="btn go" onclick="sessionDone()">Session done &mdash; advance the loop</button>
      <button class="btn ghost" onclick="missed()">Didn't train &mdash; loop holds</button>`;
  }

  html += `<div style="height:14px"></div>
    <div class="eyebrow">Targets today <span>MacroFactor logs, this plans</span></div>
    <div class="macrobar">
      <div class="budget"><div class="v"><input id="budget" type="number" inputmode="numeric" value="${st.budget}"></div><div class="k">BUDGET</div></div>
      <div><div class="v">193+</div><div class="k">PROTEIN</div></div>
      <div><div class="v">45+</div><div class="k">FAT FLOOR</div></div>
      <div><div class="v">fill</div><div class="k">CARBS</div></div>
    </div>
    <div class="backup">
      <button onclick="exportState()">Export backup</button><span>&middot;</span><button onclick="importState()">Import backup</button><span>&middot;</span><span class="build">build ${BUILD}</span>
    </div>`;

  app.innerHTML = html;
  const b = document.getElementById("budget");
  if(b) b.onchange = e=>{ st.budget = parseInt(e.target.value)||st.budget; save(); };
  renderFoot();
}

function sessionDone(){
  st.pointer = (st.pointer+1)%7;
  st.asOf = addDays(today(),1);
  save(); render();
  window.scrollTo({top:0});
}
function missed(){ /* loop holds by design; just acknowledge */ render(); }
function undoDone(){ /* reverse an accidental sessionDone: step the loop back and clear the done flag */
  st.pointer = (st.pointer+6)%7;
  st.asOf = today();
  save(); render(); window.scrollTo({top:0});
}

function renderFoot(){
  const seg = document.getElementById("weekSeg");
  seg.innerHTML = [1,2,3].map(w=>
    `<button class="${st.week===w?"on":""}" onclick="setWeek(${w})">W${w===3?"3+":w}</button>`).join("");
}
function setWeek(w){ st.week=w; save(); render(); }

/* ---------- setup ---------- */
const setup = document.getElementById("setup");
let pickedDay=null, pickedWeek=null;
function showSetup(){
  setup.classList.remove("hidden");
  const pd = document.getElementById("pickDay");
  pd.innerHTML = LOOP.map((d,i)=>
    `<button data-i="${i}">${d==="REST"?"Rest ("+(i===2?"mid":"end")+")":d+" "+NAMES[d]}</button>`).join("");
  pd.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    pickedDay=+b.dataset.i;
    pd.querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));
  });
  const pw = document.getElementById("pickWeek");
  pw.innerHTML = [1,2,3].map(w=>`<button data-w="${w}">W${w===3?"3+":w}</button>`).join("");
  pw.querySelectorAll("button").forEach(b=>b.onclick=()=>{
    pickedWeek=+b.dataset.w;
    pw.querySelectorAll("button").forEach(x=>x.classList.toggle("on",x===b));
  });
  document.getElementById("setupGo").onclick=()=>{
    if(pickedDay===null||pickedWeek===null) return;
    st = { pointer:pickedDay, asOf:today(), week:pickedWeek,
           budget:parseInt(document.getElementById("setupBudget").value)||2136, checks:{} };
    save(); setup.classList.add("hidden"); render();
  };
}
document.getElementById("fixDay").onclick=()=>{ pickedDay=null; pickedWeek=st?st.week:null; showSetup();
  if(st){ /* preselect week */ const pw=document.getElementById("pickWeek");
    pw.querySelectorAll("button").forEach(x=>x.classList.toggle("on",+x.dataset.w===st.week)); pickedWeek=st.week;
    document.getElementById("setupBudget").value=st.budget; } };

/* ---------- toast ---------- */
let toastT;
function toast(msg){
  const el = document.getElementById("toast");
  el.textContent = msg; el.classList.add("show");
  clearTimeout(toastT); toastT = setTimeout(()=>el.classList.remove("show"), 2600);
}

/* ---------- backup: export state to a file, import to restore ---------- */
function exportState(){
  if(!st){ toast("Nothing to back up yet"); return; }
  const data = JSON.stringify(st, null, 2);
  const fname = "the-day-backup-" + today() + ".json";
  /* iOS standalone: the share sheet is the reliable path (lands in Files/iCloud). */
  try{
    const file = new File([data], fname, {type:"application/json"});
    if(navigator.canShare && navigator.canShare({files:[file]})){
      navigator.share({files:[file], title:"THE DAY backup"}).catch(()=>fallbackExport(data, fname));
      return;
    }
  }catch(e){}
  fallbackExport(data, fname);
}
function fallbackExport(data, fname){
  let downloaded = false;
  try{
    const url = URL.createObjectURL(new Blob([data], {type:"application/json"}));
    const a = document.createElement("a");
    a.href = url; a.download = fname; document.body.appendChild(a); a.click();
    setTimeout(()=>{ URL.revokeObjectURL(url); a.remove(); }, 1000);
    downloaded = true;
  }catch(e){}
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(data)
      .then(()=>toast(downloaded ? "Backup saved and copied" : "Backup copied to clipboard"))
      .catch(()=>toast(downloaded ? "Backup saved" : "Copy failed - screenshot as a last resort"));
  } else {
    toast(downloaded ? "Backup saved" : "Backup unavailable on this device");
  }
}

function importState(){ document.getElementById("importFile").click(); }
function validState(o){
  return !!(o && typeof o==="object"
    && Number.isInteger(o.pointer) && o.pointer>=0 && o.pointer<7
    && typeof o.asOf==="string" && /^\d{4}-\d{2}-\d{2}$/.test(o.asOf)
    && (o.week===1||o.week===2||o.week===3)
    && typeof o.budget==="number" && o.budget>0
    && o.checks && typeof o.checks==="object");
}
document.getElementById("importFile").addEventListener("change", function(){
  const f = this.files && this.files[0];
  if(!f){ return; }
  const r = new FileReader();
  r.onload = ()=>{
    try{
      const obj = JSON.parse(r.result);
      if(!validState(obj)){ toast("That file isn't a THE DAY backup"); return; }
      if(!confirm("Replace current state with this backup? This overwrites today's checkboxes and your loop position.")) return;
      st = obj; save(); render(); window.scrollTo({top:0}); toast("Backup restored");
    }catch(e){ toast("Couldn't read that file"); }
  };
  r.onerror = ()=>toast("Couldn't read that file");
  r.readAsText(f);
  this.value = ""; /* allow re-importing the same file later */
});

/* ---------- offline + durability ---------- */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{ navigator.serviceWorker.register("sw.js").catch(()=>{}); });
}
if(navigator.storage && navigator.storage.persist){
  navigator.storage.persist().catch(()=>{});
}
/* re-render when the app returns to the foreground so a session left open across midnight
   rolls to the new day (catchUp + fresh checks) instead of showing a stale day. */
document.addEventListener("visibilitychange", ()=>{ if(!document.hidden && st) render(); });
window.addEventListener("focus", ()=>{ if(st) render(); });
/* keyboard: Enter/Space toggles a focused checklist item */
document.addEventListener("keydown", e=>{
  if(e.key==="Enter" || e.key===" " || e.key==="Spacebar"){
    const it = e.target && e.target.closest && e.target.closest(".item");
    if(it){ e.preventDefault(); it.click(); }
  }
});

if(!st){ showSetup(); } else { render(); }
</script>
</body>
</html>
